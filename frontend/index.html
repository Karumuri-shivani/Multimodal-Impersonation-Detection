<!DOCTYPE html>

<html>
<head>
    <title>Video Verification</title>
</head>
<body>

<h2>Pre-Interview Verification</h2>

<label>Enter Username:</label> <input type="text" id="username" placeholder="Enter your username" required>

<br><br>

<button id="registerDevice">Enroll Device (Phone)</button> <button id="authDevice">Authenticate Device (Phone)</button>

<br><br>

<div id="qrContainer" style="display:none;">
    <h3>Scan with your phone:</h3>
    <img id="qrImage" width="250">
</div>

<hr>

<h3>Please read the following sentence clearly:</h3>

<p style="color: blue; font-weight: bold; font-size: 18px;">
    {{ challenge }}
</p>

<hr>

<video id="preview" width="400" autoplay muted></video>

<br><br>

<button id="start" disabled>Start Recording</button> <button id="stop" disabled>Stop Recording</button>

<br><br>

<button id="enroll">Enroll</button> <button id="verify">Verify</button>

<script>
// ======================= CAMERA =======================

let mediaRecorder;
let recordedChunks = [];
let mode = null;

const video = document.getElementById("preview");
const startBtn = document.getElementById("start");
const stopBtn = document.getElementById("stop");

navigator.mediaDevices.getUserMedia({ video:true, audio:true })
.then(stream => {
    video.srcObject = stream;
    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) recordedChunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
        const username = document.getElementById("username").value;

        const blob = new Blob(recordedChunks, {type:"video/webm"});
        const formData = new FormData();
        formData.append("video", blob);
        formData.append("username", username);
        formData.append("mode", mode);

        fetch("/upload", {method:"POST", body:formData})
            .then(r=>r.text())
            .then(alert);

        recordedChunks = [];
    };
});

startBtn.onclick = () => {

    if (!mode) return alert("Select mode first");

    // 🔒 Prevent double start
    if (mediaRecorder.state === "recording") {
        alert("Already recording");
        return;
    }

    recordedChunks = [];
    mediaRecorder.start();
    startTime = Date.now();

    startBtn.disabled = true;
    stopBtn.disabled = false;

};

stopBtn.onclick = () => {

    if (mediaRecorder.state !== "recording") return;

    const duration = (Date.now() - startTime) / 1000;

    if (duration < 5) {
        alert("Speak at least 5 seconds");
        return;
    }

    mediaRecorder.stop();

    startBtn.disabled = false;
    stopBtn.disabled = true;
};

// ======================= MODE =======================

document.getElementById("enroll").onclick = () => mode="enroll";
document.getElementById("verify").onclick = () => mode="verify";

// ======================= QR FLOWS =======================

async function startQR(endpoint){

  const username = document.getElementById("username").value;
  if(!username) return alert("Enter username");

  const r = await fetch(endpoint,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username})
  });

  const data = await r.json();

  document.getElementById("qrContainer").style.display="block";
  document.getElementById("qrImage").src=data.qr;

  poll(data.session_id);
}

document.getElementById("registerDevice")
    .onclick = () => startQR("/qr_register_create");

document.getElementById("authDevice")
    .onclick = () => startQR("/qr_auth_create");

function poll(id){
  const t=setInterval(async()=>{
    const r=await fetch(`/qr_status/${id}`);
    const s=await r.json();

    if(s.authenticated){
        clearInterval(t);
        alert("Phone verification success ✅");
        document.getElementById("qrContainer").style.display="none";
        startBtn.disabled=false;
    }
  },2000);
}

</script>

</body>
</html>
